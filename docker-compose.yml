services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: songlingo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # This is the magic bridge we talked about earlier!
      # It overrides your local settings and tells Django to talk to the 'db' container
      - DB_HOST=db
    depends_on:
      - db

  mcp:
    build: ./mcp
    restart: unless-stopped
    ports:
      - "8001:8001"

# This ensures your database doesn't get wiped if the container restarts
volumes:
  postgres_data:
